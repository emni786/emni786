<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Xenonowledge — Settings</title>
    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        background: #0a0a0c;
        color: #eee;
        margin: 0;
        padding: 24px;
        max-width: 480px;
      }
      h1 { font-family: 'JetBrains Mono', monospace; color: #10b981; }
      label { display: block; font-size: 12px; color: #aaa; margin-top: 12px; }
      input {
        width: 100%; padding: 8px; background: #131318; color: #eee;
        border: 1px solid #2a2a30; border-radius: 6px; font-family: monospace;
      }
      button {
        margin-top: 14px; padding: 10px 16px; background: #10b981;
        color: #000; border: 0; border-radius: 6px; font-weight: 700; cursor: pointer;
      }
      .ok { color: #10b981; font-size: 12px; margin-top: 8px; }
      p.note { font-size: 11px; color: #777; margin-top: 16px; line-height: 1.6; }
    </style>
  </head>
  <body>
    <h1>⌬ Xenonowledge</h1>
    <p>Connect this extension to your Xenonowledge project.</p>

    <label for="projectUrl">Project URL</label>
    <input id="projectUrl" placeholder="https://your-ref.supabase.co" />

    <label for="accessToken">Extension Access Token</label>
    <input id="accessToken" type="password" placeholder="xn_..." />

    <button id="save">Save settings</button>
    <span id="ok" class="ok"></span>

    <p class="note">
      Generate a token in the web app under <em>Settings → Browser Extension → Generate token</em>.
      It is stored only in <code>chrome.storage.local</code> on this device.
    </p>

    <script src="options.js"></script>
  </body>
</html>
